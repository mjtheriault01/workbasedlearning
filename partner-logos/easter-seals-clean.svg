<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#cb4545"/>

  <!-- Easter Seals lily snowflake: 6 petals via rotation, each a tapered leaf shape -->
  <!-- Petal path: starts at center, curves out to tip and back -->
  <g transform="translate(100,82)" fill="white">
    <g transform="rotate(0)">
      <path d="M0,0 C-7,-14 -7,-32 0,-44 C7,-32 7,-14 0,0Z"/>
    </g>
    <g transform="rotate(60)">
      <path d="M0,0 C-7,-14 -7,-32 0,-44 C7,-32 7,-14 0,0Z"/>
    </g>
    <g transform="rotate(120)">
      <path d="M0,0 C-7,-14 -7,-32 0,-44 C7,-32 7,-14 0,0Z"/>
    </g>
    <g transform="rotate(180)">
      <path d="M0,0 C-7,-14 -7,-32 0,-44 C7,-32 7,-14 0,0Z"/>
    </g>
    <g transform="rotate(240)">
      <path d="M0,0 C-7,-14 -7,-32 0,-44 C7,-32 7,-14 0,0Z"/>
    </g>
    <g transform="rotate(300)">
      <path d="M0,0 C-7,-14 -7,-32 0,-44 C7,-32 7,-14 0,0Z"/>
    </g>
    <!-- Center disc -->
    <circle r="7" fill="#cb4545"/>
    <circle r="3" fill="white"/>
  </g>

  <!-- Divider lines -->
  <rect x="28" y="118" width="144" height="1.2" fill="white" opacity="0.6"/>
  <rect x="28" y="155" width="144" height="1.2" fill="white" opacity="0.6"/>

  <!-- Text -->
  <text x="100" y="136" font-family="'Arial Narrow', Arial, sans-serif" font-size="14.5" font-weight="700" fill="white" text-anchor="middle" letter-spacing="3">EASTER</text>
  <text x="100" y="153" font-family="'Arial Narrow', Arial, sans-serif" font-size="14.5" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">SEALS</text>
</svg>
